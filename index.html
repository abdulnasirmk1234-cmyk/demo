<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple E-Commerce Store</title>

  <!-- Google Analytics (replace G-XXXXXXXXXX with your Measurement ID) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    .product {
      background: white;
      padding: 15px;
      border-radius: 8px;
      width: 200px;
      text-align: center;
    }
    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>My Mini Store</h1>
</header>

<div class="container">

  <div class="product">
    <h3>Product 1</h3>
    <p>₹500</p>
    <button onclick="addToCart('Product 1')">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Product 2</h3>
    <p>₹800</p>
    <button onclick="addToCart('Product 2')">Add to Cart</button>
  </div>

</div>

<script>
  function addToCart(productName) {
    alert(productName + " added to cart!");

    // Send event to Google Analytics
    gtag('event', 'add_to_cart', {
      item_name: productName
    });
  }
</script>

</body>
</html>
